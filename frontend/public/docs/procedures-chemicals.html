<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>נהלי בטיחות — חומרים מסוכנים</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;color:#1a1a1a;direction:rtl}.page{max-width:800px;margin:20px auto;background:#fff;border:2px solid #6c3483;border-radius:8px;overflow:hidden}.header{background:#6c3483;color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center}.header h1{font-size:19px;font-weight:bold}.header p{font-size:12px;opacity:.8;margin-top:3px}.body{padding:20px 24px}.cat{margin-bottom:20px}.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;border-radius:6px;font-weight:bold;font-size:13px}.cat-blue{background:#dbeafe;color:#1e40af}.cat-amber{background:#fef3c7;color:#92400e}.cat-green{background:#dcfce7;color:#166534}.checklist{border:1px solid #e5e7eb;border-radius:6px;overflow:hidden}.check-row{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid #f3f4f6;font-size:13px}.check-row:last-child{border-bottom:none}.check-row:nth-child(even){background:#fafafa}.check-row input{width:17px;height:17px;flex-shrink:0;margin-top:2px;cursor:pointer}.sec-title{font-size:13px;font-weight:bold;color:#6c3483;border-bottom:2px solid #6c3483;padding-bottom:4px;margin-bottom:10px;margin-top:18px}.field .line{border-bottom:1px solid #999;min-height:50px}.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px}.sig-box{border:1px solid #bbb;border-radius:6px;padding:12px;text-align:center}.sig-label{font-size:11px;font-weight:bold;color:#555;margin-bottom:6px}.sig-line{border-bottom:1px solid #999;height:40px;margin-bottom:6px}.sig-name{font-size:10px;color:#777}.print-btn{display:block;margin:0 auto 20px;padding:10px 32px;background:#6c3483;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:bold;cursor:pointer}
  @media print{body{background:#fff}.page{border:none;margin:0;border-radius:0}.print-btn{display:none}}
</style>
</head>
<body>
<div class="page">
  <div class="header"><div><h1>☣️ נהלי בטיחות — חומרים מסוכנים</h1><p>Hazardous Materials Safety Procedures</p></div><div style="font-size:36px">📋</div></div>
  <div class="body">
    <div class="cat"><div class="cat-header cat-blue">📋 היתרים ואישורים</div><div class="checklist">
      <label class="check-row"><input type="checkbox"> רישיון לאחסון / שימוש בחומרים מסוכנים — מהמשרד להגנת הסביבה</label>
      <label class="check-row"><input type="checkbox"> אישור אחסון חומרים דליקים מאגף כיבוי אש</label>
      <label class="check-row"><input type="checkbox"> אישור פינוי פסולת מסוכנת ע"י קבלן מורשה</label>
    </div></div>
    <div class="cat"><div class="cat-header cat-amber">📌 נהלים מוקדמים</div><div class="checklist">
      <label class="check-row"><input type="checkbox"> גיליונות בטיחות (SDS) עדכניים לכל החומרים — נגישים לעובדים</label>
      <label class="check-row"><input type="checkbox"> הדרכת עובדים על חומרים מסוכנים ונוהל SDS — תיעוד חתום</label>
      <label class="check-row"><input type="checkbox"> בדיקת ציוד מגן אישי מתאים לחומר לפני שימוש</label>
      <label class="check-row"><input type="checkbox"> בדיקת ברז שטיפת עיניים ומקלחת חירום — תקינים ונגישים</label>
      <label class="check-row"><input type="checkbox"> נוהל שפיכה מוכר לכל הצוות — ציוד קליטת שפך בשטח</label>
    </div></div>
    <div class="cat"><div class="cat-header cat-green">📄 תיעוד נדרש</div><div class="checklist">
      <label class="check-row"><input type="checkbox"> רשימת מלאי חומרים מסוכנים — מעודכנת, חתומה, כולל כמויות</label>
      <label class="check-row"><input type="checkbox"> ארכיון גיליונות SDS — מסודר, נגיש ועדכני לגרסה אחרונה</label>
      <label class="check-row"><input type="checkbox"> תעודות הכשרה לעובדים בחומרים מסוכנים — עדכניות</label>
      <label class="check-row"><input type="checkbox"> יומן פינוי פסולת מסוכנת — תאריכים, כמויות, מסמכי קבלן</label>
    </div></div>
    <div class="sec-title">חומרים מסוכנים בשימוש</div>
    <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px">
      <tr style="background:#f3e8ff"><th style="border:1px solid #ddd;padding:6px">שם החומר</th><th style="border:1px solid #ddd;padding:6px">כמות</th><th style="border:1px solid #ddd;padding:6px">סיכון עיקרי</th><th style="border:1px solid #ddd;padding:6px">SDS זמין</th></tr>
      <tr><td style="border:1px solid #ddd;padding:6px;height:28px"></td><td style="border:1px solid #ddd;padding:6px"></td><td style="border:1px solid #ddd;padding:6px"></td><td style="border:1px solid #ddd;padding:6px;text-align:center">☐</td></tr>
      <tr><td style="border:1px solid #ddd;padding:6px;height:28px"></td><td style="border:1px solid #ddd;padding:6px"></td><td style="border:1px solid #ddd;padding:6px"></td><td style="border:1px solid #ddd;padding:6px;text-align:center">☐</td></tr>
      <tr><td style="border:1px solid #ddd;padding:6px;height:28px"></td><td style="border:1px solid #ddd;padding:6px"></td><td style="border:1px solid #ddd;padding:6px"></td><td style="border:1px solid #ddd;padding:6px;text-align:center">☐</td></tr>
    </table>
    <div class="sec-title">הערות</div><div class="field"><div class="line"></div></div>
    <div class="sec-title">חתימות</div>
    <div class="sig-grid">
      <div class="sig-box"><div class="sig-label">ממונה בטיחות</div><div class="sig-line"></div><div class="sig-name">שם: _______________ | שעה: _______</div></div>
      <div class="sig-box"><div class="sig-label">אחראי חומרים מסוכנים</div><div class="sig-line"></div><div class="sig-name">שם: _______________ | שעה: _______</div></div>
    </div>
  </div>
</div>
<br><button class="print-btn" onclick="window.print()">🖨️ הדפס</button>
</body></html>
