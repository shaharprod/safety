<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>צ'קליסט ביקורת — בטיחות אש וחירום</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;color:#1a1a1a;direction:rtl}.page{max-width:800px;margin:20px auto;background:#fff;border:2px solid #b03a2e;border-radius:8px;overflow:hidden}.header{background:#b03a2e;color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center}.header h1{font-size:19px;font-weight:bold}.header p{font-size:12px;opacity:.8;margin-top:3px}.body{padding:20px 24px}.cat{margin-bottom:20px}.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;border-radius:6px;font-weight:bold;font-size:13px;background:#eef2f7;color:#b03a2e}.checklist{border:1px solid #e5e7eb;border-radius:6px;overflow:hidden}.check-row{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid #f3f4f6;font-size:13px}.check-row:last-child{border-bottom:none}.check-row:nth-child(even){background:#fafafa}.check-row input{width:17px;height:17px;flex-shrink:0;margin-top:2px;cursor:pointer}.status{display:flex;gap:10px;margin-right:auto;flex-shrink:0;font-size:11px;color:#777}.status span{display:inline-flex;align-items:center;gap:3px}.sec-title{font-size:13px;font-weight:bold;color:#b03a2e;border-bottom:2px solid #b03a2e;padding-bottom:4px;margin-bottom:10px;margin-top:18px}.field .line{border-bottom:1px solid #999;min-height:50px}.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px}.sig-box{border:1px solid #bbb;border-radius:6px;padding:12px;text-align:center}.sig-label{font-size:11px;font-weight:bold;color:#555;margin-bottom:6px}.sig-line{border-bottom:1px solid #999;height:40px;margin-bottom:6px}.sig-name{font-size:10px;color:#777}.print-btn{display:block;margin:0 auto 20px;padding:10px 32px;background:#b03a2e;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:bold;cursor:pointer}@media print{body{background:#fff}.page{border:none;margin:0;border-radius:0}.print-btn{display:none}}</style></head>
<body><div class="page"><div class="header"><div><h1>🔥 צ'קליסט ביקורת בטיחות — בטיחות אש וחירום</h1><p>Safety Inspection Checklist</p></div><div style="font-size:36px">☑️</div></div><div class="body">
<div class="sec-title">פרטי הביקורת</div><div class="sig-grid" style="grid-template-columns:1fr 1fr 1fr">
  <div class="sig-box"><div class="sig-label">אתר / פרויקט</div><div class="sig-line"></div></div>
  <div class="sig-box"><div class="sig-label">תאריך</div><div class="sig-line"></div></div>
  <div class="sig-box"><div class="sig-label">שם הבודק</div><div class="sig-line"></div></div>
</div><br>
<div class="cat"><div class="cat-header">☑️ ציוד כיבוי</div><div class="checklist">
  <label class="check-row"><input type="checkbox"> מטפי כיבוי אש תקינים, בתוקף ונגישים<span class="status">✔️ תקין ❌ ליקוי ⊘ לא רלוונטי</span></label>
  <label class="check-row"><input type="checkbox"> ארונות שריפה (כבאי) תקינים עם צינור וראש מים<span class="status">✔️ תקין ❌ ליקוי ⊘ לא רלוונטי</span></label>
  <label class="check-row"><input type="checkbox"> ספרינקלרים — אין חסימה, בדיקה שנתית בתוקף<span class="status">✔️ תקין ❌ ליקוי ⊘ לא רלוונטי</span></label>
</div></div>
<div class="cat"><div class="cat-header">☑️ גלאים</div><div class="checklist">
  <label class="check-row"><input type="checkbox"> גלאי עשן / חום פעילים ולא מחוסמים<span class="status">✔️ תקין ❌ ליקוי ⊘ לא רלוונטי</span></label>
  <label class="check-row"><input type="checkbox"> מערכת אזעקה פעילה ונבדקת אחת לרבעון<span class="status">✔️ תקין ❌ ליקוי ⊘ לא רלוונטי</span></label>
</div></div>
<div class="cat"><div class="cat-header">☑️ מוצאי חירום</div><div class="checklist">
  <label class="check-row"><input type="checkbox"> שלטי יציאת חירום מוארים ומסומנים<span class="status">✔️ תקין ❌ ליקוי ⊘ לא רלוונטי</span></label>
  <label class="check-row"><input type="checkbox"> דלתות חירום נפתחות מבפנים ללא מפתח<span class="status">✔️ תקין ❌ ליקוי ⊘ לא רלוונטי</span></label>
  <label class="check-row"><input type="checkbox"> מסלולי פינוי פנויים מחסימות<span class="status">✔️ תקין ❌ ליקוי ⊘ לא רלוונטי</span></label>
</div></div>
<div class="cat"><div class="cat-header">☑️ דלתות אש</div><div class="checklist">
  <label class="check-row"><input type="checkbox"> דלתות אש נסגרות אוטומטית ולא מעוכבות<span class="status">✔️ תקין ❌ ליקוי ⊘ לא רלוונטי</span></label>
</div></div>
<div class="cat"><div class="cat-header">☑️ תחזוקה</div><div class="checklist">
  <label class="check-row"><input type="checkbox"> תרגיל פינוי בוצע ב-12 החודשים האחרונים<span class="status">✔️ תקין ❌ ליקוי ⊘ לא רלוונטי</span></label>
  <label class="check-row"><input type="checkbox"> אין אחסון חומרים דליקים ליד מקורות חום<span class="status">✔️ תקין ❌ ליקוי ⊘ לא רלוונטי</span></label>
  <label class="check-row"><input type="checkbox"> חדרי חשמל / ממ"ד — ללא פסולת דליקה<span class="status">✔️ תקין ❌ ליקוי ⊘ לא רלוונטי</span></label>
</div></div>
<div class="sec-title">ממצאים והערות</div><div class="field"><div class="line"></div></div>
<div class="sec-title">חתימות</div><div class="sig-grid">
  <div class="sig-box"><div class="sig-label">בודק / מבקר</div><div class="sig-line"></div><div class="sig-name">שם: _______________ | שעה: _______</div></div>
  <div class="sig-box"><div class="sig-label">ממונה בטיחות</div><div class="sig-line"></div><div class="sig-name">שם: _______________ | שעה: _______</div></div>
</div></div></div><br><button class="print-btn" onclick="window.print()">🖨️ הדפס</button></body></html>
