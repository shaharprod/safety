<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>נהלי בטיחות — עבודות בנייה</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;color:#1a1a1a;direction:rtl}.page{max-width:800px;margin:20px auto;background:#fff;border:2px solid #7b4f12;border-radius:8px;overflow:hidden}.header{background:#7b4f12;color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center}.header h1{font-size:19px;font-weight:bold}.header p{font-size:12px;opacity:.8;margin-top:3px}.meta{background:#fef3e2;padding:12px 24px;display:flex;gap:24px;font-size:12px;border-bottom:1px solid #f5d5a0}.meta span{color:#555}.meta strong{color:#7b4f12}.body{padding:20px 24px}.cat{margin-bottom:20px}.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;border-radius:6px;font-weight:bold;font-size:13px}.cat-blue{background:#dbeafe;color:#1e40af}.cat-amber{background:#fef3c7;color:#92400e}.cat-green{background:#dcfce7;color:#166534}.checklist{border:1px solid #e5e7eb;border-radius:6px;overflow:hidden}.check-row{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid #f3f4f6;font-size:13px}.check-row:last-child{border-bottom:none}.check-row:nth-child(even){background:#fafafa}.check-row input{width:17px;height:17px;flex-shrink:0;margin-top:2px;cursor:pointer}.sec-title{font-size:13px;font-weight:bold;color:#7b4f12;border-bottom:2px solid #7b4f12;padding-bottom:4px;margin-bottom:10px;margin-top:18px}.field .line{border-bottom:1px solid #999;min-height:50px}.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px}.sig-box{border:1px solid #bbb;border-radius:6px;padding:12px;text-align:center}.sig-label{font-size:11px;font-weight:bold;color:#555;margin-bottom:6px}.sig-line{border-bottom:1px solid #999;height:40px;margin-bottom:6px}.sig-name{font-size:10px;color:#777}.print-btn{display:block;margin:0 auto 20px;padding:10px 32px;background:#7b4f12;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:bold;cursor:pointer}
  @media print{body{background:#fff}.page{border:none;margin:0;border-radius:0}.print-btn{display:none}}
</style>
</head>
<body>
<div class="page">
  <div class="header"><div><h1>🏗️ נהלי בטיחות — עבודות בנייה</h1><p>Construction Safety Procedures</p></div><div style="font-size:36px">📋</div></div>
  <div class="meta"><span>תאריך: <strong id="d"></strong></span><span>אתר: <strong>_______________</strong></span><span>ממונה: <strong>_______________</strong></span></div>
  <div class="body">
    <div class="cat"><div class="cat-header cat-blue">📋 היתרים ואישורים</div><div class="checklist">
      <label class="check-row"><input type="checkbox"> היתר בנייה בתוקף מהרשות המקומית — מוצג באתר</label>
      <label class="check-row"><input type="checkbox"> מינוי ממונה בטיחות לאתר הבנייה — בכתב, כולל פרטי קשר</label>
      <label class="check-row"><input type="checkbox"> היתר עבודות חמות (ריתוך / חיתוך) — חתום לכל יום עבודה</label>
      <label class="check-row"><input type="checkbox"> תעודת כשירות עגורן / מנוף — בתוקף ומוצגת באתר</label>
    </div></div>
    <div class="cat"><div class="cat-header cat-amber">📌 נהלים מוקדמים</div><div class="checklist">
      <label class="check-row"><input type="checkbox"> הודעה לביטוח לאומי על פתיחת אתר הבנייה — אישור קבלה</label>
      <label class="check-row"><input type="checkbox"> הכרזת תוכנית הבטיחות לכל הקבלנים והעובדים באתר</label>
      <label class="check-row"><input type="checkbox"> תדריך בטיחות לקבלני משנה לפני כניסה ראשונה לאתר</label>
      <label class="check-row"><input type="checkbox"> בדיקת אטימות חפירות עמוקות מ-1.5 מ׳ לפני כניסת עובדים</label>
    </div></div>
    <div class="cat"><div class="cat-header cat-green">📄 תיעוד נדרש</div><div class="checklist">
      <label class="check-row"><input type="checkbox"> תוכנית בטיחות אתר בנייה — מאושרת ע"י מהנדס בטיחות</label>
      <label class="check-row"><input type="checkbox"> הסכמי בטיחות חתומים עם כל קבלני המשנה</label>
      <label class="check-row"><input type="checkbox"> טופס בדיקת ציוד מכני יומי (עגורן, מחפרון, ציוד כבד)</label>
      <label class="check-row"><input type="checkbox"> יומן פיקוח בטיחות שבועי — ממצאים ותיקונים</label>
    </div></div>
    <div class="sec-title">הערות</div><div class="field"><div class="line"></div></div>
    <div class="sec-title">חתימות</div>
    <div class="sig-grid">
      <div class="sig-box"><div class="sig-label">ממונה בטיחות</div><div class="sig-line"></div><div class="sig-name">שם: _______________ | שעה: _______</div></div>
      <div class="sig-box"><div class="sig-label">מנהל עבודה</div><div class="sig-line"></div><div class="sig-name">שם: _______________ | שעה: _______</div></div>
    </div>
  </div>
</div>
<br><button class="print-btn" onclick="window.print()">🖨️ הדפס</button>
<script>document.getElementById('d').textContent=new Date().toLocaleDateString('he-IL')</script>
</body></html>
